name: Keep Render Backend Alive

on:
  schedule:
    # This runs every 14 minutes (Render sleeps after 15)
    - cron: '*/10 * * * *'
  workflow_dispatch: # This lets you test it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render URL
        # REPLACE the URL below with your actual Render backend URL
        run: |
          curl -s https://portfolio-ae07.onrender.com/api/stats > /dev/null
          echo "Ping sent successfully!"